<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Político | Gestão Estratégica</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
        :root {
            --sidebar-width: 260px;
            --sidebar-collapsed-width: 70px;
            --topbar-height: 65px;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f3f4f6; 
            color: #1f2937; 
            margin: 0; 
            overflow-x: hidden; 
        }

        /* --- 1. TOPBAR FIXA --- */
        .topbar { 
            background-color: #ffffff; 
            border-bottom: 1px solid #e5e7eb; 
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); 
            padding: 0; 
            height: var(--topbar-height);
            z-index: 1050; 
            position: fixed; /* Fixa no topo */
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
        }

        .topbar-brand { font-weight: 700; font-size: 1.25rem; color: #111827; text-decoration: none; letter-spacing: -0.5px; }
        .topbar-brand i { color: #4f46e5; }
        
        /* --- 2. LAYOUT E SIDEBAR --- */
        #main-content {
            margin-top: var(--topbar-height); /* Compensa a topbar fixa */
            margin-left: var(--sidebar-width);
            transition: margin-left 0.3s ease;
            min-height: calc(100vh - var(--topbar-height));
            padding: 20px;
        }

        #main-content.expanded {
            margin-left: var(--sidebar-collapsed-width);
        }

        /* Classe utilitária para quando não estiver logado */
        body.not-logged-in #main-content {
            margin-left: 0 !important;
        }

        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); background-color: #ffffff; }
        
        /* Ajuste para Mobile */
        @media (max-width: 768px) {
            #main-content { margin-left: 70px; }
            #main-content.expanded { margin-left: 0; }
        }
    </style>
</head>

<body class="{% if not session.user_id %}not-logged-in{% endif %}">

<header class="topbar">
        <div class="container-fluid px-4 d-flex justify-content-between align-items-center w-100">
            <div class="d-flex align-items-center">
                {% if session.user_id %}
                <button class="btn btn-sm btn-light me-3 border-0" id="toggleSidebar" style="color:#4b5563; background: transparent;">
                    <i class="fa-solid fa-bars fs-5"></i>
                </button>
                {% endif %}
                <a href="/" class="topbar-brand">
                    <i class="fa-solid fa-chart-pie me-2"></i>SaaS Político
                </a>
            </div>
            
            <div class="d-flex align-items-center gap-3">
                {% if session.user_id %}
                    <span class="text-muted text-sm d-none d-md-inline"><i class="fa-regular fa-user me-2"></i>{{ session.nome }}</span>
                    <a href="/auth/logout" class="btn btn-sm btn-outline-secondary">Sair</a>
                {% endif %}
            </div>
        </div>
    </header>

    {% if session.user_id %}
        {% include 'includes/sidebar.html' %}
    {% endif %}

    <div id="main-content">
        <div class="container-fluid p-4 pt-5">
            {% block content %}{% endblock %}
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
<script>
        document.addEventListener("DOMContentLoaded", function() {
            const toggleBtn = document.getElementById('toggleSidebar');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');

            // === LÓGICA DE PERSISTÊNCIA DA SIDEBAR ===
            
            // 1. Verifica se existe um estado salvo no navegador
            const sidebarState = localStorage.getItem('sidebarStatus');

            // 2. Se estiver salvo como 'collapsed', aplica as classes antes de mostrar a página
            if (sidebarState === 'collapsed' && sidebar && mainContent) {
                sidebar.classList.add('collapsed');
                mainContent.classList.add('expanded');
            }

            if (toggleBtn && sidebar && mainContent) {
                toggleBtn.addEventListener('click', function() {
                    // Alterna as classes
                    sidebar.classList.toggle('collapsed');
                    mainContent.classList.toggle('expanded');
                    
                    // 3. Salva o novo estado no localStorage
                    if (sidebar.classList.contains('collapsed')) {
                        localStorage.setItem('sidebarStatus', 'collapsed');
                    } else {
                        localStorage.setItem('sidebarStatus', 'expanded');
                    }
                    
                    // Avisa os gráficos (Chart.js etc) que o tamanho mudou
                    setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 300);
                });
            }
        });
    </script>

<script>
function atualizarNotificacoes() {
    fetch('/crm/api/notificacoes/contagem')
        .then(response => response.json())
        .then(data => {
            const badge = document.getElementById('badge-notificacoes');
            if (badge) {
                if (data.count > 0) {
                    badge.innerText = data.count;
                    badge.style.display = 'inline-flex'; // Mostra se tiver algo
                    // Opcional: faz o badge pulsar se o número aumentou
                    badge.classList.add('pulse-animation'); 
                } else {
                    badge.style.display = 'none'; // Esconde se for zero
                }
            }
        })
        .catch(err => console.error('Erro ao buscar notificações:', err));
}

// Verifica a cada 30 segundos (30000 ms)
setInterval(atualizarNotificacoes, 30000);

// Primeira execução ao carregar a página
document.addEventListener('DOMContentLoaded', atualizarNotificacoes);
</script>

<style>
/* Uma animação discreta para quando chegar algo novo */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}
.pulse-animation { animation: pulse 0.5s ease-in-out; }
</style>
</body>
</html>
