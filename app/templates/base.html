<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Político | Gestão Estratégica</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* 1. SEUS ESTILOS ORIGINAIS INTACTOS (Reseta o B.I para o padrão Premium) */
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; color: #1f2937; margin: 0; overflow-x: hidden; }
        .topbar { background-color: #ffffff; border-bottom: 1px solid #e5e7eb; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); padding: 12px 0; z-index: 1050; position: relative;}
        .topbar-brand { font-weight: 700; font-size: 1.25rem; color: #111827; text-decoration: none; letter-spacing: -0.5px; }
        .topbar-brand i { color: #4f46e5; }
        
        /* A MÁGICA DOS GRÁFICOS E BOTÕES VOLTOU AQUI: */
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); background-color: #ffffff; }
        .btn { border-radius: 8px; font-weight: 500; padding: 8px 16px; transition: all 0.2s; }
        .btn-primary { background-color: #4f46e5; border-color: #4f46e5; }
        
        /* 2. MECÂNICA DA NOVA SIDEBAR (Layout e Margens) */
        #main-content {
            margin-left: 260px; /* var(--sidebar-width) */
            transition: margin-left 0.3s ease;
            min-height: calc(100vh - 65px);
        }

        #main-content.expanded {
            margin-left: 70px; /* var(--sidebar-collapsed-width) */
        }

        body.not-logged-in #main-content {
            margin-left: 0;
        }

        @media (max-width: 768px) {
            #main-content { margin-left: 70px; }
        }
    </style>
</head>

<body class="{% if not session.user_id %}not-logged-in{% endif %}">

    <header class="topbar sticky-top">
        <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                {% if session.user_id %}
                <button class="btn btn-sm btn-light me-3 border-0 d-md-none d-lg-block" id="toggleSidebar" style="color:#4b5563; background: transparent;">
                    <i class="fa-solid fa-bars fs-5"></i>
                </button>
                {% endif %}
                <a href="/" class="topbar-brand">
                    <i class="fa-solid fa-chart-pie me-2"></i>SaaS Político
                </a>
            </div>
            
            <div class="d-flex align-items-center gap-3">
                {% if session.user_id %}
                    <span class="text-muted text-sm"><i class="fa-regular fa-user me-2"></i>{{ session.nome }}</span>
                    <a href="/auth/logout" class="btn btn-sm btn-outline-secondary">Sair</a>
                {% endif %}
            </div>
        </div>
    </header>

    {% if session.user_id %}
        {% include 'includes/sidebar.html' %}
    {% endif %}

    <div id="main-content">
        <div class="container-fluid p-4 pt-5">
            {% block content %}{% endblock %}
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const toggleBtn = document.getElementById('toggleSidebar');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');

            if (toggleBtn && sidebar) {
                toggleBtn.addEventListener('click', function() {
                    sidebar.classList.toggle('collapsed');
                    mainContent.classList.toggle('expanded');
                    
                    setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 300);
                });
            }
        });
    </script>
</body>
</html>
