<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>SaaS Político</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">MVP Político</span>
            <a href="/auth/logout" class="btn btn-outline-danger btn-sm">Sair</a>
        </div>
    </nav>
    <div class="container">
        <div class="row">
            <div class="col-md-3">
                <div class="list-group">
                    <a href="/crm/" class="list-group-item">Dashboard</a>
                    {% if permissoes.permite_mapa %}
                    <a href="#" class="list-group-item">Mapa (Liberado)</a>
                    {% else %}
                    <a href="#" class="list-group-item disabled text-muted">Mapa (Bloqueado)</a>
                    {% endif %}
                </div>
            </div>
            <div class="col-md-9">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
