<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Político | Gestão Estratégica</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* Fundo cinza bem claro, estilo Vercel */
            color: #1f2937;
        }

        /* Navbar Superior (Header) */
        .topbar {
            background-color: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            padding: 12px 0;
        }
        .topbar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: #111827;
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        .topbar-brand i { color: #4f46e5; } /* Detalhe na logo */

        /* Menu Lateral (Sidebar) */
        .sidebar {
            background-color: #ffffff;
            border-right: 1px solid #e5e7eb;
            min-height: calc(100vh - 65px);
            padding: 24px 16px;
        }
        .list-group-item {
            border: none;
            padding: 10px 16px;
            color: #4b5563;
            font-weight: 500;
            border-radius: 8px !important;
            margin-bottom: 6px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .list-group-item:hover {
            background-color: #f3f4f6;
            color: #111827;
        }
        .list-group-item.active {
            background-color: #4f46e5; /* Roxo SaaS (Indigo) */
            color: #ffffff;
        }

        /* Cards (Os blocos brancos) */
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            background-color: #ffffff;
        }
        .card-header {
            background-color: transparent;
            border-bottom: 1px solid #e5e7eb;
            padding: 16px 20px;
            font-weight: 600;
            color: #111827;
        }

        /* Botões */
        .btn {
            border-radius: 8px;
            font-weight: 500;
            padding: 8px 16px;
            transition: all 0.2s;
        }
        .btn-primary {
            background-color: #4f46e5;
            border-color: #4f46e5;
        }
        .btn-primary:hover {
            background-color: #4338ca;
            border-color: #4338ca;
        }

        /* Tabelas */
        .table { margin-bottom: 0; }
        .table th {
            font-weight: 600;
            color: #6b7280;
            background-color: #f9fafb;
            border-bottom: 1px solid #e5e7eb;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            padding: 12px 16px;
        }
        .table td {
            vertical-align: middle;
            color: #374151;
            padding: 16px;
            border-bottom: 1px solid #e5e7eb;
        }
    </style>
</head>
<body>

    <header class="topbar sticky-top">
        <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
            <a href="/crm/" class="topbar-brand">
                <i class="fa-solid fa-chart-pie me-2"></i>SaaS Político
            </a>
            <div class="d-flex align-items-center gap-3">
                <span class="text-muted text-sm"><i class="fa-regular fa-user me-2"></i>{{ usuario_logado.email if usuario_logado }}</span>
                <a href="/auth/logout" class="btn btn-sm btn-outline-secondary">Sair</a>
            </div>
        </div>
    </header>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0 sidebar d-none d-md-block">
                <div class="list-group">
                    <a href="/crm/" class="list-group-item text-decoration-none">
                        <i class="fa-solid fa-house w-20px"></i> Dashboard
                    </a>
                    
                    <a href="/crm/apoiadores" class="list-group-item text-decoration-none">
                        <i class="fa-solid fa-users w-20px"></i> Apoiadores
                    </a>
                    
                    <a href="/crm/equipe" class="list-group-item text-decoration-none">
                        <i class="fa-solid fa-users-gear w-20px"></i> Minha Equipe
                    </a>    
                    <div class="mt-4 mb-2 px-3 text-uppercase text-muted" style="font-size: 0.7rem; font-weight: 600;">Estratégia</div>

                    {% if permissoes.permite_mapa %}
                    <a href="/crm/mapa" class="list-group-item text-decoration-none">
                        <i class="fa-solid fa-map-location-dot w-20px"></i> Mapa de Bairros
                    </a>
                    {% else %}
                    <a href="#" class="list-group-item text-decoration-none text-muted" style="opacity: 0.6; cursor: not-allowed;" title="Disponível no Plano Elite">
                        <i class="fa-solid fa-lock w-20px"></i> Mapa (Premium)
                    </a>
                    {% endif %}
                </div>
            </div>

            <div class="col-md-10 p-4 pt-5">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
