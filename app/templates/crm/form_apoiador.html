{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Cadastrar Novo Apoiador</h2>
    <a href="/crm/apoiadores" class="btn btn-outline-secondary">Voltar</a>
</div>

<div class="card p-4 shadow-sm">
    <form action="/crm/apoiadores/novo" method="POST">
        <h5 class="text-primary mb-3">Dados Pessoais</h5>
        <div class="row mb-4">
            <div class="col-md-6">
                <label>Nome Completo</label>
                <input type="text" name="nome" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label>Telefone / WhatsApp</label>
                <input type="text" name="telefone" class="form-control" placeholder="(00) 00000-0000" required>
            </div>
        </div>

        <h5 class="text-primary mb-3">Endereço e Base Eleitoral</h5>
        <div class="row mb-3">
            <div class="col-md-3">
                <label>CEP</label>
                <input type="text" name="cep" id="cep" class="form-control" placeholder="Apenas números" required>
            </div>
            <div class="col-md-7">
                <label>Logradouro (Rua, Av.)</label>
                <input type="text" name="logradouro" id="logradouro" class="form-control" required>
            </div>
            <div class="col-md-2">
                <label>Número</label>
                <input type="text" name="numero" class="form-control" required>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-4">
                <label>Bairro</label>
                <input type="text" name="bairro" id="bairro" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label>Cidade</label>
                <input type="text" name="cidade" id="cidade" class="form-control" readonly required>
            </div>
            <div class="col-md-2">
                <label>UF</label>
                <input type="text" name="uf" id="uf" class="form-control" readonly required>
            </div>
        </div>

        <h5 class="text-primary mb-3">Engajamento</h5>
        <div class="row mb-4">
            <div class="col-md-6">
                <label>Grau de Apoio</label>
                <select name="grau_apoio" class="form-select" required>
                    <option value="forte">Forte (Multiplicador)</option>
                    <option value="medio">Médio (Simpatizante)</option>
                    <option value="fraco">Indeciso / Fraco</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn btn-success w-100">Salvar Apoiador no CRM</button>
    </form>
</div>

<script>
    document.getElementById('cep').addEventListener('blur', function() {
        // Remove tudo que não for número do CEP digitado
        let cep = this.value.replace(/\D/g, ''); 

        if (cep.length === 8) {
            // Mostra carregando nos campos (feedback visual)
            document.getElementById('logradouro').value = 'Buscando...';
            document.getElementById('bairro').value = 'Buscando...';
            document.getElementById('cidade').value = 'Buscando...';
            document.getElementById('uf').value = '...';

            // Faz a requisição na API gratuita do ViaCEP
            fetch(`https://viacep.com.br/ws/${cep}/json/`)
                .then(response => response.json())
                .then(data => {
                    if (!data.erro) {
                        // Preenche os campos com os dados dos Correios
                        document.getElementById('logradouro').value = data.logradouro;
                        document.getElementById('bairro').value = data.bairro;
                        document.getElementById('cidade').value = data.localidade;
                        document.getElementById('uf').value = data.uf;
                        
                        // Opcional: Focar no campo de número após preencher automático
                        document.querySelector('input[name="numero"]').focus();
                    } else {
                        alert("CEP não encontrado!");
                        limparCamposCEP();
                    }
                })
                .catch(error => {
                    console.error('Erro ao buscar CEP:', error);
                    alert("Erro ao buscar o CEP. Digite manualmente.");
                    limparCamposCEP();
                });
        }
    });

    function limparCamposCEP() {
        document.getElementById('logradouro').value = '';
        document.getElementById('bairro').value = '';
        document.getElementById('cidade').value = '';
        document.getElementById('uf').value = '';
    }
</script>
{% endblock %}
