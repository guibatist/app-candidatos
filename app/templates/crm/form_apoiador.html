{% extends 'base.html' %}
{% block content %}

<style>
    /* ==========================================
       RESPONSIVIDADE SAAS MOBILE (< 768px)
       ========================================== */
    @media (max-width: 768px) {
        .btn-mobile-full { width: 100% !important; justify-content: center; margin-top: 10px; }
        .cabecalho-responsivo { flex-direction: column; align-items: flex-start !important; }
        
        /* Reduz um pouco o padding interno dos cards para ganhar espaço na tela */
        .card-saas-padding { padding: 1.25rem !important; }
        
        /* Aumenta a área de toque dos inputs e selects no celular */
        .form-control, .form-select { padding-top: 0.7rem !important; padding-bottom: 0.7rem !important; }
        
        /* Melhora o espaçamento dos botões de tags (pautas) */
        .tags-container { gap: 8px !important; }
        .tags-container label { padding: 8px 16px !important; flex-grow: 1; text-align: center; }
    }
</style>

<div class="d-flex cabecalho-responsivo justify-content-between align-items-md-center mb-4">
    <div>
        <h2 class="fw-bold text-dark mb-0">Cadastrar Apoiador</h2>
        <p class="text-muted small mb-0">Preencha os dados para adicionar ao CRM da campanha.</p>
    </div>
    <a href="/crm/apoiadores" class="btn btn-outline-secondary rounded-pill px-4 shadow-sm bg-white fw-medium btn-mobile-full">
        <i class="fa-solid fa-arrow-left me-2"></i>Voltar
    </a>
</div>

<form action="/crm/apoiadores/novo" method="POST">
    <div class="row g-4">
        <div class="col-lg-8">
            
            <div class="card border-0 shadow-sm rounded-4 mb-4 p-4 card-saas-padding">
                <h5 class="fw-bold text-dark mb-4"><i class="fa-solid fa-user text-primary me-2"></i>Dados Pessoais</h5>
                
                <div class="row g-3">
                    <div class="col-12 col-md-6">
                        <label class="form-label text-muted small fw-bold text-uppercase">Nome Completo</label>
                        <input type="text" name="nome" class="form-control bg-light border-0 py-2" required>
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label text-muted small fw-bold text-uppercase">WhatsApp / Celular</label>
                        <input type="text" name="telefone" id="telefone" class="form-control bg-light border-0 py-2" placeholder="(00) 00000-0000" maxlength="15" required>
                    </div>
                    
                    <div class="col-12">
                        <label class="form-label text-muted small fw-bold text-uppercase">Indicado na campanha por (Opcional)</label>
                        <div class="position-relative">
                            <input type="text" name="indicado_por" id="indicado_por" class="form-control bg-light border-0 py-2" placeholder="Digite o nome para buscar..." autocomplete="off">
                            <ul id="sugestoes_indicacao" class="list-group position-absolute w-100 shadow-sm" style="z-index: 1000; display: none; max-height: 200px; overflow-y: auto;">
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm rounded-4 mb-4 p-4 card-saas-padding">
                <h5 class="fw-bold text-dark mb-4"><i class="fa-solid fa-chart-pie text-info me-2"></i>Análise Demográfica e Perfil</h5>
                
                <div class="row g-3">
                    <div class="col-12 col-md-4">
                        <label class="form-label text-muted small fw-bold text-uppercase">Sexo</label>
                        <select name="sexo" class="form-select bg-light border-0 py-2">
                            <option value="">Não informado</option>
                            <option value="Masculino">Masculino</option>
                            <option value="Feminino">Feminino</option>
                            <option value="Outro">Outro</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label text-muted small fw-bold text-uppercase">Faixa Etária</label>
                        <select name="faixa_etaria" class="form-select bg-light border-0 py-2">
                            <option value="">Não informada</option>
                            <option value="16-24">16-24</option>
                            <option value="25-34">25-34</option>
                            <option value="35-60">35-60</option>
                            <option value="60+">60+</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label text-muted small fw-bold text-uppercase">Renda Familiar</label>
                        <select name="renda_familiar" class="form-select bg-light border-0 py-2">
                            <option value="">Não informada</option>
                            <option value="Até 2 salários">Até 2 salários</option>
                            <option value="2-5 salários">2-5 salários</option>
                            <option value="5-10 salários">5-10 salários</option>
                            <option value="10+">10+ salários</option>
                        </select>
                    </div>
                    
                    <div class="col-12 col-md-6">
                        <label class="form-label text-muted small fw-bold text-uppercase">Grau de Instrução</label>
                        <select name="grau_instrucao" class="form-select bg-light border-0 py-2">
                            <option value="">Não informado</option>
                            <option value="Fundamental">Fundamental</option>
                            <option value="Médio">Médio</option>
                            <option value="Superior">Superior</option>
                            <option value="Pós/Mestrado/Doutorado">Pós/Mestrado/Doutorado</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label text-muted small fw-bold text-uppercase">De onde veio?</label>
                        <select name="origem_cadastro" class="form-select bg-light border-0 py-2">
                            <option value="">Selecione...</option>
                            <option value="Instagram">Instagram</option>
                            <option value="TikTok">TikTok</option>
                            <option value="Linkedin">Linkedin</option>
                            <option value="Site">Site</option>
                            <option value="Indicação">Indicação (Boca a Boca)</option>
                        </select>
                    </div>
                    
                    <div class="col-12">
                        <label class="form-label text-muted small fw-bold text-uppercase">Posicionamento Político</label>
                        <select name="posicionamento_politico" class="form-select bg-light border-0 py-2">
                            <option value="">Neutro / Não informado</option>
                            <option value="Esquerda">Esquerda</option>
                            <option value="Centro-Esquerda">Centro-Esquerda</option>
                            <option value="Centro">Centro</option>
                            <option value="Centro-Direita">Centro-Direita</option>
                            <option value="Direita">Direita</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm rounded-4 mb-4 mb-lg-0 p-4 card-saas-padding">
                <h5 class="fw-bold text-dark mb-4"><i class="fa-solid fa-map-location-dot text-danger me-2"></i>Base Geográfica</h5>
                
                <div class="row g-3">
                    <div class="col-12 col-md-4">
                        <label class="form-label text-muted small fw-bold text-uppercase">CEP</label>
                        <input type="text" name="cep" id="cep" class="form-control bg-light border-0 py-2" placeholder="00000-000" maxlength="9" required>
                    </div>
                    <div class="col-12 col-md-8">
                        <label class="form-label text-muted small fw-bold text-uppercase">Logradouro (Rua, Av.)</label>
                        <input type="text" name="logradouro" id="logradouro" class="form-control bg-light border-0 py-2" required>
                    </div>
                    
                    <div class="col-12 col-md-4">
                        <label class="form-label text-muted small fw-bold text-uppercase">Número</label>
                        <input type="text" name="numero" class="form-control bg-light border-0 py-2" required>
                    </div>
                    <div class="col-12 col-md-8">
                        <label class="form-label text-muted small fw-bold text-uppercase">Complemento (Opcional)</label>
                        <input type="text" name="complemento" class="form-control bg-light border-0 py-2" placeholder="Apto, Bloco, Casa 2...">
                    </div>

                    <div class="col-12 col-md-5">
                        <label class="form-label text-muted small fw-bold text-uppercase">Bairro</label>
                        <input type="text" name="bairro" id="bairro" class="form-control bg-light border-0 py-2" required>
                    </div>
                    <div class="col-12 col-md-5">
                        <label class="form-label text-muted small fw-bold text-uppercase">Cidade</label>
                        <input type="text" name="cidade" id="cidade" class="form-control bg-light border-0 py-2" readonly required>
                    </div>
                    <div class="col-12 col-md-2">
                        <label class="form-label text-muted small fw-bold text-uppercase">UF</label>
                        <input type="text" name="uf" id="uf" class="form-control bg-light border-0 py-2" readonly required>
                    </div>
                </div>
            </div>

        </div>

        <div class="col-lg-4">
            
            <div class="card border-0 shadow-sm rounded-4 mb-4 p-4 card-saas-padding">
                <h5 class="fw-bold text-dark mb-4"><i class="fa-solid fa-fire text-warning me-2"></i>Estratégia</h5>
                
                <div class="row g-2 mb-4">
                    <div class="col-12">
                        <label class="form-label text-muted small fw-bold text-uppercase mb-1" title="Quantos votos essa pessoa influencia na própria casa?">Potencial de Votos (Influência)</label>
                        <p class="text-muted" style="font-size: 0.75rem; margin-bottom: 8px;">Quantos votos ele(a) consegue influenciar?</p>
                        <input type="number" name="votos_familia" class="form-control bg-primary bg-opacity-10 border-primary border-opacity-25 py-3 text-center fw-bold text-primary fs-5 rounded-3" min="1" value="1" required>
                    </div>
                </div>

                <label class="form-label text-muted small fw-bold text-uppercase mb-2">Pautas / Áreas de Interesse</label>
                <div class="d-flex flex-wrap gap-2 mb-4 tags-container">
                    <input type="checkbox" class="btn-check" name="tags" id="tag1" value="Saúde">
                    <label class="btn btn-outline-primary btn-sm rounded-pill" for="tag1">Saúde</label>
                    
                    <input type="checkbox" class="btn-check" name="tags" id="tag2" value="Educação">
                    <label class="btn btn-outline-primary btn-sm rounded-pill" for="tag2">Educação</label>
                    
                    <input type="checkbox" class="btn-check" name="tags" id="tag3" value="Segurança">
                    <label class="btn btn-outline-primary btn-sm rounded-pill" for="tag3">Segurança</label>
                    
                    <input type="checkbox" class="btn-check" name="tags" id="tag4" value="Causa Animal">
                    <label class="btn btn-outline-primary btn-sm rounded-pill" for="tag4">Causa Animal</label>

                    <input type="checkbox" class="btn-check" name="tags" id="tag5" value="Esporte">
                    <label class="btn btn-outline-primary btn-sm rounded-pill" for="tag5">Esporte</label>

                    <input type="checkbox" class="btn-check" name="tags" id="tag6" value="Religião">
                    <label class="btn btn-outline-primary btn-sm rounded-pill" for="tag6">Religião</label>
                </div>

                <label class="form-label text-muted small fw-bold text-uppercase mb-3">Ativos da Campanha</label>
                
                <div class="form-check form-switch d-flex align-items-center mb-3 p-0">
                    <input class="form-check-input fs-5 m-0" type="checkbox" name="oferece_muro" id="muro">
                    <label class="form-check-label ms-2 text-dark fw-medium" for="muro"><i class="fa-solid fa-paint-roller text-muted me-1"></i> Muro para Placa/Pintura</label>
                </div>
                
                <div class="form-check form-switch d-flex align-items-center mb-3 p-0">
                    <input class="form-check-input fs-5 m-0" type="checkbox" name="oferece_carro" id="carro">
                    <label class="form-check-label ms-2 text-dark fw-medium" for="carro"><i class="fa-solid fa-car text-muted me-1"></i> Carro para Adesivo</label>
                </div>

                <label class="form-label text-muted small fw-bold text-uppercase mt-4">Observações / Demandas</label>
                <textarea name="observacoes" class="form-control bg-light border-0 mb-2" rows="4" placeholder="Reclamações do bairro, pedidos, etc..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-bold shadow-sm fs-5 d-flex justify-content-center align-items-center">
                <i class="fa-solid fa-check-circle me-2"></i>Salvar no CRM
            </button>

        </div>
    </div>
</form>

<script>
    // 1. MÁSCARA AUTOMÁTICA DE TELEFONE (DD) 00000-0000
    document.getElementById('telefone').addEventListener('input', function (e) {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
    });

    // 2. MÁSCARA DO CEP 00000-000
    document.getElementById('cep').addEventListener('input', function (e) {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,5})(\d{0,3})/);
        e.target.value = !x[2] ? x[1] : x[1] + '-' + x[2];
    });

    // 3. BUSCA DE CEP AUTOMÁTICA (ViaCEP)
    document.getElementById('cep').addEventListener('blur', function() {
        let cep = this.value.replace(/\D/g, ''); 
        if (cep.length === 8) {
            document.getElementById('logradouro').value = 'Buscando...';
            document.getElementById('bairro').value = 'Buscando...';
            document.getElementById('cidade').value = 'Buscando...';
            document.getElementById('uf').value = '...';

            fetch(`https://viacep.com.br/ws/${cep}/json/`)
                .then(response => response.json())
                .then(data => {
                    if (!data.erro) {
                        document.getElementById('logradouro').value = data.logradouro;
                        document.getElementById('bairro').value = data.bairro;
                        document.getElementById('cidade').value = data.localidade;
                        document.getElementById('uf').value = data.uf;
                        document.querySelector('input[name="numero"]').focus();
                    } else {
                        alert("CEP não encontrado!");
                        limparCamposCEP();
                    }
                })
                .catch(error => {
                    alert("Erro ao buscar o CEP.");
                    limparCamposCEP();
                });
        }
    });

    function limparCamposCEP() {
        document.getElementById('logradouro').value = '';
        document.getElementById('bairro').value = '';
        document.getElementById('cidade').value = '';
        document.getElementById('uf').value = '';
    }

    // 4. AUTOCOMPLETE DE INDICAÇÕES (Buscando no Backend)
    const inputIndicado = document.getElementById('indicado_por');
    const listaSugestoes = document.getElementById('sugestoes_indicacao');

    inputIndicado.addEventListener('input', async function() {
        const termo = this.value;
        if (termo.length < 1) {
            listaSugestoes.style.display = 'none';
            return;
        }

        try {
            const response = await fetch(`/crm/api/apoiadores/busca?q=${encodeURIComponent(termo)}`);
            const dados = await response.json();

            listaSugestoes.innerHTML = '';
            
            if (dados.length > 0) {
                dados.forEach(pessoa => {
                    const li = document.createElement('li');
                    li.className = 'list-group-item list-group-item-action cursor-pointer border-0 border-bottom text-dark fw-medium';
                    li.style.cursor = 'pointer';
                    li.innerHTML = `<i class="fa-solid fa-user-check text-success me-2"></i> ${pessoa.nome}`;
                    
                    li.onclick = () => {
                        inputIndicado.value = pessoa.nome;
                        listaSugestoes.style.display = 'none';
                    };
                    listaSugestoes.appendChild(li);
                });
                listaSugestoes.style.display = 'block';
            } else {
                listaSugestoes.style.display = 'none';
            }
        } catch (error) {
            console.error("Erro ao buscar indicações:", error);
        }
    });

    document.addEventListener('click', function(e) {
        if (e.target !== inputIndicado) {
            listaSugestoes.style.display = 'none';
        }
    });
</script>
{% endblock %}
