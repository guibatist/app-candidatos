{% extends 'base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1 text-primary">Mapa de Calor Eleitoral</h2>
            <p class="text-muted small">Localização precisa dos apoiadores rua a rua.</p>
        </div>
        <div class="badge bg-primary px-3 py-2 rounded-pill">
            <i class="fa-solid fa-location-dot me-2"></i>Apoiadores no Mapa: {{ dados_mapa|length }}
        </div>
    </div>

    <div class="row">
        <div class="col-md-9">
            <div id="map" class="shadow-sm rounded-4" style="height: 650px; width: 100%; border: 1px solid #e5e7eb; background-color: #f8f9fa;"></div>
        </div>
        
        <div class="col-md-3">
            <div class="card border-0 shadow-sm rounded-4 mb-3">
                <div class="card-header bg-white fw-bold border-0 pt-3 text-dark">Legenda de Apoio</div>
                <div class="card-body">
                    <div class="d-flex align-items-center mb-3">
                        <span class="badge me-2" style="background: #ef4444; width: 18px; height: 18px; border-radius: 50%; display: inline-block;">&nbsp;</span> 
                        <span class="small fw-medium">Apoio Alto / Liderança</span>
                    </div>
                    <div class="d-flex align-items-center mb-3">
                        <span class="badge me-2" style="background: #3b82f6; width: 18px; height: 18px; border-radius: 50%; display: inline-block;">&nbsp;</span> 
                        <span class="small fw-medium">Apoio Médio / Geral</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    var map = L.map('map').setView([-15.78, -47.93], 4);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors',
        maxZoom: 19
    }).addTo(map);

    var layerGroup = L.featureGroup().addTo(map);
    var dados = {{ dados_mapa | tojson | safe }};

    if (dados && dados.length > 0) {
        dados.forEach(function(ponto) {
            if (ponto.lat && ponto.lng) {
                var corPonto = (ponto.grau_apoio === 'alto' || ponto.lideranca) ? '#ef4444' : '#3b82f6';
                
                var circle = L.circle([ponto.lat, ponto.lng], {
                    color: corPonto,
                    fillColor: corPonto,
                    fillOpacity: 0.8,
                    radius: 15 // Tamanho pequeno para acertar a casa
                }).addTo(layerGroup);

                // O Fim do Undefined: Usando os dados formatados corretamente
                var nome = ponto.nome || "Apoiador sem nome";
                var endereco = `${ponto.logradouro || ''} ${ponto.numero || ''}`.trim() || "Rua não informada";
                var cidade_bairro = `${ponto.bairro || ''} - ${ponto.cidade || ''}`.trim() || "";

                var popupContent = `
                    <div style="min-width: 150px;">
                        <strong style="font-size: 14px;">${nome}</strong><br>
                        <span style="color: #666; font-size: 12px;">
                            ${endereco}<br>
                            ${cidade_bairro}
                        </span>
                    </div>
                `;
                circle.bindPopup(popupContent);
            }
        });

        var bounds = layerGroup.getBounds();
            if (bounds.isValid()) {
                // maxZoom: 15 limita a aproximação. Quanto menor o número, mais longe fica.
                map.fitBounds(bounds, { 
                    padding: [50, 50],
                    maxZoom: 15 
                });
            }
        }

    setTimeout(function(){ 
        map.invalidateSize(); 
    }, 400);
</script>
{% endblock %}
